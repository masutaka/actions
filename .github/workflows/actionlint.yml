name: actionlint

on:
  workflow_call:

env:
  ACTIONLINT_VERSION: 1.7.12
  ACTIONLINT_CHECKSUM: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8

jobs:
  actionlint:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        shell: bash
        run: |
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSL -O "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${tarball}"
          echo "${ACTIONLINT_CHECKSUM}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" actionlint
          ./actionlint -color
